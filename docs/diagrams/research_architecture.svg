<svg viewBox="0 0 1200 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="grad_input" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_api" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A4FA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_orchestration" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D4E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_agent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_agent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C42;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E67E22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_agent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_agent4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF5252;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D32F2F;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_agent5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF3838;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C62828;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad_output" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3A73;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-size="32" font-weight="bold" text-anchor="middle" fill="#333">
    ROAMLY RESEARCH ARCHITECTURE
  </text>
  <text x="600" y="70" font-size="13" text-anchor="middle" fill="#666">
    Multi-Agent LLM System for Travel Itinerary Planning
  </text>

  <!-- Layer 1: User Input -->
  <g>
    <rect x="250" y="110" width="700" height="100" fill="url(#grad_input)" rx="8"/>
    <text x="600" y="145" font-size="18" font-weight="bold" fill="white" text-anchor="middle">User Input</text>
    <text x="600" y="170" font-size="12" fill="white" text-anchor="middle">City, Dates, Budget, Preferences</text>
    <text x="600" y="188" font-size="11" fill="white" text-anchor="middle">Example: "Paris, 7 days, €2000, culture + food"</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="600" y1="210" x2="600" y2="240" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: Backend API & Validation -->
  <g>
    <rect x="250" y="240" width="700" height="100" fill="url(#grad_api)" rx="8"/>
    <text x="600" y="275" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Backend API Layer</text>
    <text x="600" y="298" font-size="12" fill="white" text-anchor="middle">FastAPI + Pydantic v2 Validation</text>
    <text x="600" y="316" font-size="11" fill="white" text-anchor="middle">Input validation, constraint enforcement</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="600" y1="340" x2="600" y2="370" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: CrewAI Orchestrator -->
  <g>
    <rect x="250" y="370" width="700" height="100" fill="url(#grad_orchestration)" rx="8"/>
    <text x="600" y="405" font-size="18" font-weight="bold" fill="white" text-anchor="middle">CrewAI Orchestrator</text>
    <text x="600" y="428" font-size="12" fill="white" text-anchor="middle">Sequential Task Execution • Context Propagation</text>
    <text x="600" y="446" font-size="11" fill="white" text-anchor="middle">Task Dependency Graph • Pydantic Schema Validation</text>
  </g>

  <!-- Arrow 3 -->
  <line x1="600" y1="470" x2="600" y2="510" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Multi-Agent Pipeline Title -->
  <text x="600" y="505" font-size="14" font-weight="bold" fill="#333" text-anchor="middle">Multi-Agent LLM Reasoning Pipeline</text>

  <!-- Agent 1: Urban Navigator -->
  <g>
    <rect x="80" y="530" width="180" height="140" fill="url(#grad_agent1)" rx="8"/>
    <text x="170" y="560" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🗺️ Task 1</text>
    <text x="170" y="580" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Urban Navigator</text>
    <text x="170" y="600" font-size="10" fill="white" text-anchor="middle">GPT-4 Agent</text>
    <text x="170" y="618" font-size="9" fill="white" text-anchor="middle">• Route planning</text>
    <text x="170" y="633" font-size="9" fill="white" text-anchor="middle">• Attractions</text>
    <text x="170" y="648" font-size="9" fill="white" text-anchor="middle">~15-20 sec</text>
    <circle cx="170" cy="660" r="6" fill="white"/>
  </g>

  <!-- Agent 2: Culture Curator -->
  <g>
    <rect x="310" y="530" width="180" height="140" fill="url(#grad_agent2)" rx="8"/>
    <text x="400" y="560" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🎭 Task 2</text>
    <text x="400" y="580" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Culture Curator</text>
    <text x="400" y="600" font-size="10" fill="white" text-anchor="middle">GPT-4 Agent</text>
    <text x="400" y="618" font-size="9" fill="white" text-anchor="middle">• Cultural context</text>
    <text x="400" y="633" font-size="9" fill="white" text-anchor="middle">• Events & heritage</text>
    <text x="400" y="648" font-size="9" fill="white" text-anchor="middle">~12-18 sec</text>
    <circle cx="400" cy="660" r="6" fill="white"/>
  </g>

  <!-- Agent 3: Gastronomy Scout -->
  <g>
    <rect x="540" y="530" width="180" height="140" fill="url(#grad_agent3)" rx="8"/>
    <text x="630" y="560" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🍽️ Task 3</text>
    <text x="630" y="580" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Gastronomy Scout</text>
    <text x="630" y="600" font-size="10" fill="white" text-anchor="middle">GPT-4 Agent</text>
    <text x="630" y="618" font-size="9" fill="white" text-anchor="middle">• Restaurants</text>
    <text x="630" y="633" font-size="9" fill="white" text-anchor="middle">• Cuisine analysis</text>
    <text x="630" y="648" font-size="9" fill="white" text-anchor="middle">~18-25 sec</text>
    <circle cx="630" cy="660" r="6" fill="white"/>
  </g>

  <!-- Agent 4: Budget Balancer -->
  <g>
    <rect x="770" y="530" width="180" height="140" fill="url(#grad_agent4)" rx="8"/>
    <text x="860" y="560" font-size="13" font-weight="bold" fill="white" text-anchor="middle">💰 Task 4</text>
    <text x="860" y="580" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Budget Balancer</text>
    <text x="860" y="600" font-size="10" fill="white" text-anchor="middle">GPT-4 Agent</text>
    <text x="860" y="618" font-size="9" fill="white" text-anchor="middle">• Cost estimation</text>
    <text x="860" y="633" font-size="9" fill="white" text-anchor="middle">• Optimization</text>
    <text x="860" y="648" font-size="9" fill="white" text-anchor="middle">~10-15 sec</text>
    <circle cx="860" cy="660" r="6" fill="white"/>
  </g>

  <!-- Agent 5: Time Orchestrator -->
  <g>
    <rect x="1000" y="530" width="180" height="140" fill="url(#grad_agent5)" rx="8"/>
    <text x="1090" y="560" font-size="13" font-weight="bold" fill="white" text-anchor="middle">⏰ Task 5</text>
    <text x="1090" y="580" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Time Orchestrator</text>
    <text x="1090" y="600" font-size="10" fill="white" text-anchor="middle">GPT-4 Agent</text>
    <text x="1090" y="618" font-size="9" fill="white" text-anchor="middle">• Schedule synthesis</text>
    <text x="1090" y="633" font-size="9" fill="white" text-anchor="middle">• Timeline creation</text>
    <text x="1090" y="648" font-size="9" fill="white" text-anchor="middle">~8-12 sec</text>
    <circle cx="1090" cy="660" r="6" fill="white"/>
  </g>

  <!-- Sequential flow arrows between agents -->
  <path d="M 260 600 L 310 600" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 490 600 L 540 600" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 720 600 L 770 600" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 950 600 L 1000 600" stroke="#333" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Agent Details Box -->
  <g>
    <rect x="50" y="700" width="1100" height="100" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="8"/>
    <text x="600" y="725" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Key Research: Sequential Task Dependency</text>
    <text x="600" y="745" font-size="11" text-anchor="middle" fill="#666">
      Each agent receives Urban Navigator output → Culture Curator output → Gastronomy Scout output → Budget Balancer output
    </text>
    <text x="600" y="765" font-size="11" text-anchor="middle" fill="#666">
      Context propagation enables progressive refinement. Total latency: 60-90 seconds. Estimated tokens: 4000-8000.
    </text>
    <text x="600" y="785" font-size="10" text-anchor="middle" fill="#999">
      Pydantic v2 validates each agent's JSON output before passing to next agent.
    </text>
  </g>

  <!-- Arrow 4 -->
  <line x1="600" y1="810" x2="600" y2="840" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Tool Integration Box -->
  <g>
    <rect x="50" y="840" width="1100" height="120" fill="#FFF9E6" stroke="#FFB347" stroke-width="2" rx="8"/>
    <text x="600" y="865" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">External Tool Integration (LLM Function Calling)</text>

    <rect x="70" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="145" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">SerperDev API</text>
    <text x="145" y="915" font-size="9" text-anchor="middle" fill="#666">Google Search</text>
    <text x="145" y="929" font-size="9" text-anchor="middle" fill="#666">Real-time data</text>

    <rect x="240" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="315" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Google Maps API</text>
    <text x="315" y="915" font-size="9" text-anchor="middle" fill="#666">Routes, Places</text>
    <text x="315" y="929" font-size="9" text-anchor="middle" fill="#666">Geocoding</text>

    <rect x="410" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="485" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Web Scraping</text>
    <text x="485" y="915" font-size="9" text-anchor="middle" fill="#666">Current data</text>
    <text x="485" y="929" font-size="9" text-anchor="middle" fill="#666">Verification</text>

    <rect x="580" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="655" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">OpenAI GPT-4</text>
    <text x="655" y="915" font-size="9" text-anchor="middle" fill="#666">LLM Backbone</text>
    <text x="655" y="929" font-size="9" text-anchor="middle" fill="#666">Reasoning</text>

    <rect x="750" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="825" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">JSON Validation</text>
    <text x="825" y="915" font-size="9" text-anchor="middle" fill="#666">Schema Check</text>
    <text x="825" y="929" font-size="9" text-anchor="middle" fill="#666">Error Handling</text>

    <rect x="920" y="880" width="150" height="70" fill="white" stroke="#FFB347" stroke-width="1" rx="4"/>
    <text x="995" y="898" font-size="10" font-weight="bold" text-anchor="middle" fill="#333">Context Cache</text>
    <text x="995" y="915" font-size="9" text-anchor="middle" fill="#666">Data Storage</text>
    <text x="995" y="929" font-size="9" text-anchor="middle" fill="#666">Token Economy</text>
  </g>

  <!-- Arrow 5 -->
  <line x1="600" y1="970" x2="600" y2="1000" stroke="#333" stroke-width="3" marker-end="url(#arrowhead)"/>

  <!-- Final Output -->
  <g>
    <rect x="250" y="1000" width="700" height="140" fill="url(#grad_output)" rx="8"/>
    <text x="600" y="1030" font-size="18" font-weight="bold" fill="white" text-anchor="middle">Final Itinerary Output</text>
    <text x="600" y="1055" font-size="12" fill="white" text-anchor="middle">JSON-formatted structured itinerary with:</text>
    <text x="600" y="1075" font-size="11" fill="white" text-anchor="middle">• Day-by-day schedule with attractions, cultural events, restaurants</text>
    <text x="600" y="1093" font-size="11" fill="white" text-anchor="middle">• Optimized routes and travel times (Urban Navigator)</text>
    <text x="600" y="1111" font-size="11" fill="white" text-anchor="middle">• Cost breakdown and budget compliance verification (Budget Balancer)</text>
    <text x="600" y="1129" font-size="11" fill="white" text-anchor="middle">• Estimated total cost, duration, quality metrics</text>
  </g>

  <!-- Research Insights Box -->
  <g>
    <rect x="50" y="1170" width="1100" height="150" fill="#E8F4F8" stroke="#3498DB" stroke-width="2" rx="8"/>
    <text x="600" y="1195" font-size="13" font-weight="bold" text-anchor="middle" fill="#333">Research Key Findings</text>

    <text x="70" y="1220" font-size="11" fill="#333">1. Sequential Execution Advantage: Clear task dependencies enable transparent reasoning & debugging</text>
    <text x="70" y="1242" font-size="11" fill="#333">2. Tool Integration Effectiveness: SerperDev + Google APIs reduce hallucination vs. pure LLM approaches</text>
    <text x="70" y="1264" font-size="11" fill="#333">3. Context Propagation: JSON schema validation between agents ensures data consistency across pipeline</text>
    <text x="70" y="1286" font-size="11" fill="#333">4. Cost-Quality Trade-off: GPT-4 costs ~$0.18/request; total system cost $0.22 per itinerary at production scale</text>
    <text x="70" y="1308" font-size="11" fill="#333">5. Latency Challenge: 60-90 sec response time acceptable for planning but not real-time recommendations</text>
  </g>

  <!-- Legend -->
  <g>
    <text x="70" y="1360" font-size="11" font-weight="bold" fill="#333">Legend:</text>
    <rect x="70" y="1370" width="15" height="15" fill="url(#grad_input)" rx="2"/>
    <text x="95" y="1382" font-size="10" fill="#333">User Input & Output</text>

    <rect x="320" y="1370" width="15" height="15" fill="url(#grad_agent1)" rx="2"/>
    <text x="345" y="1382" font-size="10" fill="#333">Agent Tasks</text>

    <rect x="550" y="1370" width="15" height="15" fill="url(#grad_orchestration)" rx="2"/>
    <text x="575" y="1382" font-size="10" fill="#333">Orchestration & Validation</text>
  </g>
</svg>