    <text x="70" y="280" font-size="18" font-weight="bold" fill="#7B68EE">🔌 LAYER 2: API GATEWAY</text>

    <rect x="100" y="300" width="400" height="50" fill="url(#grad2)" rx="6"/>
    <text x="300" y="320" font-size="14" font-weight="bold" fill="white" text-anchor="middle">FastAPI Server</text>
    <text x="300" y="340" font-size="11" fill="white" text-anchor="middle">Uvicorn • Port 8000 • REST API</text>

    <rect x="700" y="300" width="400" height="50" fill="url(#grad2)" rx="6"/>
    <text x="900" y="320" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Routes & Middleware</text>
    <text x="900" y="340" font-size="11" fill="white" text-anchor="middle">/api/plan • /api/status • Logging</text>
