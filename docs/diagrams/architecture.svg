    <text x="170" y="858" font-size="9" fill="white" text-anchor="middle">Google Search</text>
    <text x="170" y="873" font-size="9" fill="white" text-anchor="middle">Real-time Data</text>

    <rect x="290" y="820" width="200" height="80" fill="url(#grad5)" rx="6"/>
    <text x="390" y="840" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Web Scraper</text>
    <text x="390" y="858" font-size="9" fill="white" text-anchor="middle">Data Verification</text>
    <text x="390" y="873" font-size="9" fill="white" text-anchor="middle">Dynamic Content</text>

    <rect x="510" y="820" width="200" height="80" fill="url(#grad5)" rx="6"/>
    <text x="610" y="840" font-size="12" font-weight="bold" fill="white" text-anchor="middle">LLM Function Calling</text>
    <text x="610" y="858" font-size="9" fill="white" text-anchor="middle">Tool Invocation</text>
    <text x="610" y="873" font-size="9" fill="white" text-anchor="middle">ReAct Paradigm</text>

    <rect x="730" y="820" width="200" height="80" fill="url(#grad6)" rx="6"/>
    <text x="830" y="840" font-size="12" font-weight="bold" fill="white" text-anchor="middle">OpenAI GPT-4</text>
    <text x="830" y="858" font-size="9" fill="white" text-anchor="middle">Language Understanding</text>
    <text x="830" y="873" font-size="9" fill="white" text-anchor="middle">Reasoning & Generation</text>

    <rect x="950" y="820" width="180" height="80" fill="url(#grad6)" rx="6"/>
    <text x="1040" y="840" font-size="12" font-weight="bold" fill="white" text-anchor="middle">Google APIs</text>
    <text x="1040" y="858" font-size="9" fill="white" text-anchor="middle">Maps • Places</text>
    <text x="1040" y="873" font-size="9" fill="white" text-anchor="middle">Geocoding</text>
