    <text x="240" y="470" font-size="13" font-weight="bold" fill="white" text-anchor="middle">CrewAI Crew Manager</text>
    <text x="240" y="487" font-size="10" fill="white" text-anchor="middle">v0.203.2 • Sequential Execution</text>

    <rect x="460" y="450" width="280" height="50" fill="url(#grad3)" rx="6"/>
    <text x="600" y="470" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Task Dependency Graph</text>
    <text x="600" y="487" font-size="10" fill="white" text-anchor="middle">DAG Structure • Output Validation</text>

    <rect x="820" y="450" width="280" height="50" fill="url(#grad3)" rx="6"/>
    <text x="960" y="470" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Process Orchestrator</text>
    <text x="960" y="487" font-size="10" fill="white" text-anchor="middle">Context Propagation • Error Handling</text>
