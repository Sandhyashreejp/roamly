<svg viewBox="0 0 1200 1400" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B68EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5A4FA8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50C878;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2E7D4E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFB347;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC8C3A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#CC5555;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6C3A73;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2471A3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" font-size="36" font-weight="bold" text-anchor="middle" fill="#333">
    ROAMLY SYSTEM ARCHITECTURE
  </text>
  <text x="600" y="70" font-size="14" text-anchor="middle" fill="#666">
    Multi-Agent Travel Itinerary Planner
  </text>

  <!-- Layer 1: Frontend -->
  <g>
    <rect x="50" y="100" width="1100" height="120" fill="url(#grad1)" opacity="0.1" stroke="url(#grad1)" stroke-width="3" rx="8"/>
    <text x="70" y="130" font-size="18" font-weight="bold" fill="#4A90E2">🎨 LAYER 1: PRESENTATION</text>

    <rect x="100" y="150" width="400" height="50" fill="url(#grad1)" rx="6"/>
    <text x="300" y="170" font-size="14" font-weight="bold" fill="white" text-anchor="middle">React 18 + Vite Frontend</text>
    <text x="300" y="190" font-size="11" fill="white" text-anchor="middle">UI Components • State Management</text>

    <rect x="700" y="150" width="400" height="50" fill="url(#grad1)" rx="6"/>
    <text x="900" y="170" font-size="14" font-weight="bold" fill="white" text-anchor="middle">User Interface</text>
    <text x="900" y="190" font-size="11" fill="white" text-anchor="middle">Responsive Design • Real-time Updates</text>
  </g>

  <!-- Arrow Down 1 -->
