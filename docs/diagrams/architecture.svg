    <rect x="870" y="600" width="180" height="110" fill="url(#grad4)" rx="6"/>
    <text x="960" y="625" font-size="13" font-weight="bold" fill="white" text-anchor="middle">⏰ Time Orchestrator</text>
    <text x="960" y="645" font-size="9" fill="white" text-anchor="middle">Schedule Planning</text>
    <text x="960" y="658" font-size="9" fill="white" text-anchor="middle">Duration Estimation</text>
    <text x="960" y="671" font-size="9" fill="white" text-anchor="middle">Timeline Optimization</text>
    <circle cx="960" cy="695" r="8" fill="white"/>
    <text x="960" y="700" font-size="10" fill="#FFB347" text-anchor="middle" font-weight="bold">Task 5</text>
  </g>

