    <text x="375" y="1050" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Pydantic v2 Data Validation</text>
    <text x="375" y="1067" font-size="10" fill="white" text-anchor="middle">Type Safety • Schema Definitions</text>

    <rect x="650" y="1030" width="350" height="50" fill="url(#grad7)" rx="6"/>
    <text x="825" y="1050" font-size="13" font-weight="bold" fill="white" text-anchor="middle">Context Storage & Cache</text>
    <text x="825" y="1067" font-size="10" fill="white" text-anchor="middle">Data Persistence • Memory Management</text>
  </g>

  <!-- Data Flow Info -->
  <g>
    <rect x="50" y="1130" width="1100" height="90" fill="#f5f5f5" stroke="#ccc" stroke-width="2" rx="8"/>
    <text x="600" y="1160" font-size="16" font-weight="bold" text-anchor="middle" fill="#333">REQUEST/RESPONSE DATA FLOW</text>
    <text x="600" y="1190" font-size="12" text-anchor="middle" fill="#666">
      User Input → React Frontend → FastAPI Backend → CrewAI Orchestrator → Agents Execute Tasks (Parallel) → External APIs → Pydantic Validation → Response to User
    </text>
  </g>

  <!-- Legend -->
  <g>
    <text x="60" y="1270" font-size="14" font-weight="bold" fill="#333">ARCHITECTURE LAYERS:</text>

    <rect x="60" y="1290" width="20" height="20" fill="url(#grad1)" rx="3"/>
    <text x="90" y="1305" font-size="11" fill="#333">Presentation Layer (Frontend)</text>

    <rect x="400" y="1290" width="20" height="20" fill="url(#grad2)" rx="3"/>
    <text x="430" y="1305" font-size="11" fill="#333">API Gateway & Backend</text>

    <rect x="60" y="1330" width="20" height="20" fill="url(#grad3)" rx="3"/>
    <text x="90" y="1345" font-size="11" fill="#333">CrewAI Orchestration</text>

    <rect x="400" y="1330" width="20" height="20" fill="url(#grad4)" rx="3"/>
    <text x="430" y="1345" font-size="11" fill="#333">Intelligent Agent Layer</text>

    <rect x="60" y="1370" width="20" height="20" fill="url(#grad5)" rx="3"/>
    <text x="90" y="1385" font-size="11" fill="#333">Tools & External Services</text>

    <rect x="400" y="1370" width="20" height="20" fill="url(#grad7)" rx="3"/>
    <text x="430" y="1385" font-size="11" fill="#333">Data Validation & Storage</text>
  </g>
</svg>