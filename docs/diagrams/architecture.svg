    <text x="160" y="658" font-size="9" fill="white" text-anchor="middle">Attractions</text>
    <text x="160" y="671" font-size="9" fill="white" text-anchor="middle">Navigation Analysis</text>
    <circle cx="160" cy="695" r="8" fill="white"/>
    <text x="160" y="700" font-size="10" fill="#FFB347" text-anchor="middle" font-weight="bold">Task 1</text>

    <!-- Agent 2 -->
    <rect x="270" y="600" width="180" height="110" fill="url(#grad4)" rx="6"/>
    <text x="360" y="625" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🎭 Culture Curator</text>
    <text x="360" y="645" font-size="9" fill="white" text-anchor="middle">Cultural Insights</text>
    <text x="360" y="658" font-size="9" fill="white" text-anchor="middle">Events & Heritage</text>
    <text x="360" y="671" font-size="9" fill="white" text-anchor="middle">Local Information</text>
    <circle cx="360" cy="695" r="8" fill="white"/>
    <text x="360" y="700" font-size="10" fill="#FFB347" text-anchor="middle" font-weight="bold">Task 2</text>

    <!-- Agent 3 -->
    <rect x="470" y="600" width="180" height="110" fill="url(#grad4)" rx="6"/>
    <text x="560" y="625" font-size="13" font-weight="bold" fill="white" text-anchor="middle">🍽️ Gastronomy Scout</text>
    <text x="560" y="645" font-size="9" fill="white" text-anchor="middle">Restaurant Discovery</text>
    <text x="560" y="658" font-size="9" fill="white" text-anchor="middle">Cuisine Analysis</text>
    <text x="560" y="671" font-size="9" fill="white" text-anchor="middle">Reviews & Ratings</text>
    <circle cx="560" cy="695" r="8" fill="white"/>
    <text x="560" y="700" font-size="10" fill="#FFB347" text-anchor="middle" font-weight="bold">Task 3</text>

    <!-- Agent 4 -->
    <rect x="670" y="600" width="180" height="110" fill="url(#grad4)" rx="6"/>
    <text x="760" y="625" font-size="13" font-weight="bold" fill="white" text-anchor="middle">💰 Budget Balancer</text>
    <text x="760" y="645" font-size="9" fill="white" text-anchor="middle">Cost Estimation</text>
    <text x="760" y="658" font-size="9" fill="white" text-anchor="middle">Optimization</text>
    <text x="760" y="671" font-size="9" fill="white" text-anchor="middle">Budget Tracking</text>
    <circle cx="760" cy="695" r="8" fill="white"/>
    <text x="760" y="700" font-size="10" fill="#FFB347" text-anchor="middle" font-weight="bold">Task 4</text>

